<!DOCTYPE html>
<html>
<head>
    <title>Student Registration - Placement Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <span class="logo">Placement Portal</span>
    <a href="/login" class="nav-link">Login</a>
</div>

<div class="container">
    <div class="auth-card">
        <div class="auth-title">Student Registration</div>
        <div class="auth-sub">Create your account to apply for placements</div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="success-msg">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" name="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" name="email" placeholder="student@college.edu" required>
            </div>

            <div class="form-group">
                <label>Password *</label>
                <input type="password" name="password" placeholder="Create a password" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" placeholder="Enter your phone number">
            </div>

            <div class="form-group">
                <label>Department</label>
                <select name="department">
                    <option value="Computer Science">Computer Science</option>
                    <option value="Information Technology">Information Technology</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Mechanical">Mechanical</option>
                    <option value="Civil">Civil</option>
                </select>
            </div>

            <div class="form-group">
                <label>Year</label>
                <select name="year">
                    <option value="1st Year">1st Year</option>
                    <option value="2nd Year">2nd Year</option>
                    <option value="3rd Year">3rd Year</option>
                    <option value="4th Year">4th Year</option>
                </select>
            </div>

            <div class="form-group">
                <label>CGPA</label>
                <input type="number" step="0.01" name="cgpa" placeholder="e.g., 8.5" min="0" max="10">
            </div>

            <button type="submit" class="btn btn-primary">Register</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login">Login here</a><br>
            <span class="helper-text">Want to register as company? <a href="/company_register">Company Registration</a></span>
        </div>
    </div>
</div>

</body>
</html>
