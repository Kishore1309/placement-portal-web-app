<!DOCTYPE html>
<html>

<head>
    <title>Manage Students - Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="navbar">
        <span class="logo">Placement Portal</span>
        <div class="nav-links">
            <a href="/admin_dashboard">Dashboard</a>
            <a href="/admin_students">Students</a>
            <a href="/admin_companies">Companies</a>
            <a href="/admin_applications">Applications</a>
            <a href="/logout">Logout</a>
        </div>
    </div>
    <div class="container">
        <h1 class="page-title">Manage Students</h1>
        <div class="card">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                    </tr>
                </thead>
                <tbody>
                    {% for s in students %}
                    <tr>
                        <td>{{ s[0] }}</td>
                        <td>{{ s[1] }}</td>
                        <td>{{ s[2] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
